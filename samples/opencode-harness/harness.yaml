apiVersion: goondan.ai/v1
kind: Package
metadata:
  name: opencode-harness-sample
spec:
  dependencies:
    - name: "@goondan/openharness-base"
      version: "0.0.1-alpha3"
---
apiVersion: goondan.ai/v1
kind: Model
metadata:
  name: claude-haiku-4-5
spec:
  provider: anthropic
  model: claude-haiku-4-5
  apiKey:
    valueFrom:
      env: ANTHROPIC_API_KEY
---
apiVersion: goondan.ai/v1
kind: Tool
metadata:
  name: opencode
  labels:
    tier: opencode
spec:
  entry: ./dist/tools/opencode.js
  errorMessageLimit: 2000
  exports:
    - name: bash
      description: Execute a shell command in the current workdir.
      parameters:
        type: object
        properties:
          command:
            type: string
            description: Shell command string to execute.
          cwd:
            type: string
            description: Optional working directory path relative to workdir.
          timeoutMs:
            type: number
            description: "Maximum execution time in milliseconds (default: 120000)."
          env:
            type: object
            description: Optional environment variable overrides merged with process.env.
          description:
            type: string
            description: Short human-readable description of what this command does.
        additionalProperties: false
        required:
          - command
    - name: read
      description: Read file or directory from workdir (opencode-style).
      parameters:
        type: object
        properties:
          filePath:
            type: string
            description: File or directory path (absolute or workdir-relative).
          offset:
            type: number
            description: "Line/entry offset to start from (1-indexed, default: 1)."
          limit:
            type: number
            description: "Maximum lines/entries to read (default: 2000)."
        additionalProperties: false
        required:
          - filePath
    - name: write
      description: Write a text file in workdir.
      parameters:
        type: object
        properties:
          filePath:
            type: string
            description: File path (absolute or workdir-relative).
          content:
            type: string
            description: UTF-8 content to write.
        additionalProperties: false
        required:
          - filePath
          - content
    - name: edit
      description: Edit a text file by replacing a target string.
      parameters:
        type: object
        properties:
          filePath:
            type: string
            description: File path (absolute or workdir-relative).
          oldString:
            type: string
            description: Exact text to replace.
          newString:
            type: string
            description: Replacement text.
          replaceAll:
            type: boolean
            description: Replace all matches instead of only the first one.
        additionalProperties: false
        required:
          - filePath
          - oldString
          - newString
    - name: glob
      description: Find files by a glob-like pattern (limited).
      parameters:
        type: object
        properties:
          pattern:
            type: string
            description: Glob pattern (supports **, *, ?).
          path:
            type: string
            description: "Optional directory path to search in (default: workdir)."
          limit:
            type: number
            description: "Maximum results (default: 100)."
        additionalProperties: false
        required:
          - pattern
    - name: grep
      description: Search file contents by regex (ripgrep when available).
      parameters:
        type: object
        properties:
          pattern:
            type: string
            description: Regular expression pattern.
          path:
            type: string
            description: "Optional directory path to search in (default: workdir)."
          include:
            type: string
            description: Optional glob filter for files (e.g. \"*.ts\").
          limit:
            type: number
            description: "Maximum results (default: 100)."
        additionalProperties: false
        required:
          - pattern
    - name: webfetch
      description: Fetch a URL via HTTP GET and return text, markdown, html, or image content.
      parameters:
        type: object
        properties:
          url:
            type: string
            description: HTTP/HTTPS URL to request.
          format:
            type: string
            description: "Return format: text, markdown, or html (default: markdown)."
          headers:
            type: object
            description: Optional request headers object.
          timeoutMs:
            type: number
            description: "Request timeout in milliseconds (default: 30000)."
          maxBytes:
            type: number
            description: "Maximum response body bytes returned (default: 500000)."
        additionalProperties: false
        required:
          - url
    - name: websearch
      description: Search the public web for recent information and return summarized context.
      parameters:
        type: object
        properties:
          query:
            type: string
            description: Search query.
          numResults:
            type: number
            description: Number of results to request.
          livecrawl:
            type: string
            description: fallback | preferred
          type:
            type: string
            description: auto | fast | deep
          contextMaxCharacters:
            type: number
            description: Optional context size budget.
        additionalProperties: false
        required:
          - query
    - name: codesearch
      description: Search public code and library documentation context for a programming query.
      parameters:
        type: object
        properties:
          query:
            type: string
            description: Search query for APIs, SDKs, libraries, or framework usage.
          tokensNum:
            type: number
            description: Approximate number of tokens to return (1000-50000).
        additionalProperties: false
        required:
          - query
    - name: task
      description: Delegate a bounded task to a nested OpenHarness runner.
      parameters:
        type: object
        properties:
          description:
            type: string
            description: Short description of the delegated task.
          prompt:
            type: string
            description: The task prompt for the nested runner.
          subagent_type:
            type: string
            description: general | explore
          task_id:
            type: string
            description: Optional existing task id to resume.
          command:
            type: string
            description: Optional original command context.
        additionalProperties: false
        required:
          - description
          - prompt
          - subagent_type
    - name: apply_patch
      description: Apply a patch in the \"*** Begin Patch\" format (add/update/delete/move).
      parameters:
        type: object
        properties:
          patchText:
            type: string
            description: Full patch text.
        additionalProperties: false
        required:
          - patchText
    - name: invalid
      description: Internal fallback tool used when the model produces an invalid tool call.
      parameters:
        type: object
        properties:
          tool:
            type: string
            description: Invalid tool name.
          error:
            type: string
            description: Validation error.
        additionalProperties: false
        required:
          - tool
          - error
    - name: question
      description: Ask the user one or more clarification questions in an interactive CLI session. Fails clearly in non-interactive or non-TTY environments.
      parameters:
        type: object
        properties:
          questions:
            type: array
            description: Questions to ask in order.
            items:
              type: object
              properties:
                question:
                  type: string
                  description: Full question to ask.
                header:
                  type: string
                  description: Short label for the question.
                options:
                  type: array
                  description: Optional answer choices.
                  items:
                    type: object
                    properties:
                      label:
                        type: string
                      description:
                        type: string
                    additionalProperties: false
                    required:
                      - label
                      - description
                multiple:
                  type: boolean
                  description: Allow multiple selections.
                custom:
                  type: boolean
                  description: Allow free-form answers.
              additionalProperties: false
              required:
                - question
        additionalProperties: false
        required:
          - questions
    - name: skill
      description: |
        Load a local skill file and inject its instructions into the conversation.

        Available local skills in this session:
        - danggeun-writing-tone
        - manager-mode
        - skill-creator
        - skill-installer
        - wide-scope-mode

        Tool output includes a <skill_content name="..."> block with the loaded instructions and sampled local files.
      parameters:
        type: object
        properties:
          name:
            type: string
            description: Skill name to load.
        additionalProperties: false
        required:
          - name
---
apiVersion: goondan.ai/v1
kind: Extension
metadata:
  name: opencode-todo
  labels:
    tier: opencode
spec:
  entry: ./dist/extensions/todo.js
---
apiVersion: goondan.ai/v1
kind: Extension
metadata:
  name: opencode-harness
  labels:
    tier: opencode
spec:
  entry: ./dist/extensions/opencode-harness.js
---
apiVersion: goondan.ai/v1
kind: Agent
metadata:
  name: opencode
spec:
  modelConfig:
    modelRef: Model/claude-haiku-4-5
    params:
      temperature: 0.2
      maxTokens: 2048
  tools:
    - Tool/opencode
  extensions:
    - Extension/opencode-harness
    - Extension/context-message
    - Extension/message-compaction
    - Extension/opencode-todo
