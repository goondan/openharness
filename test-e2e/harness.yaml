apiVersion: goondan.ai/v1
kind: Package
metadata:
  name: e2e-test
spec:
  dependencies:
    - name: "@goondan/openharness-base"
      version: "0.0.1-alpha4"
---
apiVersion: goondan.ai/v1
kind: Model
metadata:
  name: claude-haiku
spec:
  provider: anthropic
  model: claude-haiku-4-5
  apiKey:
    valueFrom:
      env: ANTHROPIC_API_KEY
---
apiVersion: goondan.ai/v1
kind: Agent
metadata:
  name: assistant
spec:
  prompt:
    system: "You are a helpful assistant. Answer concisely in the language of the user's message."
  modelConfig:
    modelRef: Model/claude-haiku
    params:
      temperature: 0.2
      maxTokens: 1024
  tools:
    - Tool/bash
  extensions:
    - Extension/context-message
